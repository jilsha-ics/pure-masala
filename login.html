<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pure Masala - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Google Fonts (matching all pages) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(rgba(31, 79, 43, 0.7), rgba(20, 50, 20, 0.8)),
                        url('https://images.unsplash.com/photo-1596040033229-a9821ebd058d?q=80&w=2070&auto=format&fit=crop') 
                        no-repeat center center/cover;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Home Arrow Button */
        .home-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: #eab53a;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f4f2b;
            font-size: 1.5rem;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #fff2cf;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .home-btn:hover {
            background: #1f5a2a;
            color: #eab53a;
            transform: scale(1.1) translateX(-5px);
            border-color: #eab53a;
        }

        .home-btn i {
            transition: 0.3s;
        }

        .home-btn:hover i {
            transform: translateX(-3px);
        }

        .login-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 45px 40px;
            width: 400px;
            border-radius: 40px 12px 40px 12px;
            box-shadow: 0 25px 40px -12px #1f4f2b;
            border: 2px solid #fbe6b1;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1f4f2b;
            font-family: 'Playfair Display', serif;
            letter-spacing: 1.2px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0 #f0ddaa;
        }

        .logo i {
            color: #eab53a;
            margin-right: 8px;
        }

        .tagline {
            font-size: 14px;
            color: #5a715a;
            margin-bottom: 25px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        h2 {
            margin-bottom: 25px;
            color: #1f4f2b;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            border-bottom: 3px solid #eab53a;
            display: inline-block;
            padding-bottom: 8px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: #1f4f2b;
            margin-bottom: 6px;
            display: block;
        }

        .input-group label i {
            color: #eab53a;
            margin-right: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 25px;
            border: 2px solid #d0dbb8;
            background: #fefcf8;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }

        .input-group input:focus {
            border-color: #eab53a;
            box-shadow: 0 0 0 4px #faeec780;
        }

        .input-group input::placeholder {
            color: #a1b59b;
            font-size: 0.9rem;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1f5a2a;
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .login-btn:hover {
            background: #eab53a;
            color: #1f3f1f;
            transform: scale(1.02);
            border-color: #1f5a2a;
        }

        .login-btn i {
            margin-right: 8px;
        }

        .extra-links {
            margin-top: 20px;
            font-size: 14px;
        }

        .extra-links p {
            margin: 8px 0;
            color: #4f6b4a;
        }

        .extra-links a {
            text-decoration: none;
            color: #c43e2c;
            font-weight: 600;
            transition: 0.2s;
        }

        .extra-links a:hover {
            color: #eab53a;
            text-decoration: underline;
        }

        .extra-links a i {
            font-size: 0.8rem;
            margin-left: 4px;
        }

        footer {
            margin-top: 25px;
            font-size: 12px;
            color: #8a9a8a;
            border-top: 1px solid #eeddaa;
            padding-top: 15px;
        }

        /* SUCCESS MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(30, 62, 30, 0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #fff;
            padding: 40px;
            width: 360px;
            border-radius: 40px 12px 40px 12px;
            text-align: center;
            animation: pop 0.3s ease;
            border: 3px solid #eab53a;
            box-shadow: 0 25px 40px -12px #1f4f2b;
        }

        @keyframes pop {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .success-icon {
            font-size: 4rem;
            color: #1f5a2a;
            margin-bottom: 15px;
            background: #f0f7e6;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid #eab53a;
        }

        .modal-content h3 {
            color: #1f4f2b;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .modal-content p {
            color: #5a715a;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        .modal button {
            padding: 12px 35px;
            border: none;
            border-radius: 60px;
            background: #1f5a2a;
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .modal button:hover {
            background: #eab53a;
            color: #1f3f1f;
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-box {
                width: 90%;
                padding: 30px 20px;
            }
            
            .home-btn {
                top: 20px;
                left: 20px;
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Home Arrow Button -->
    <a href="index.html" class="home-btn" title="Back to Home">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="login-box">
        <div class="logo">
            <i class="fas fa-seedling"></i> Pure Masala
        </div>
        <div class="tagline">Authentic Taste. Pure Quality. Since 1952</div>

        <h2><i class="fas fa-lock me-2" style="color: #eab53a; font-size: 1.5rem;"></i> Login</h2>

        <form id="loginForm">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" placeholder="your@email.com" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-key"></i> Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="extra-links">
            <p><a href="#"><i class="fas fa-question-circle"></i> Forgot Password?</a></p>
            <p>Don't have an account? <a href="register.html">Register Now <i class="fas fa-arrow-right"></i></a></p>
        </div>

        <footer>
            <i class="fas fa-copyright"></i> 2026 Pure Masala. All rights reserved.
        </footer>
    </div>

    <!-- SUCCESS MODAL -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3>Welcome Back!</h3>
            <p>Login Successful <i class="fas fa-smile" style="color: #eab53a;"></i></p>
            <button onclick="closeModal()">
                Continue <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </div>
    </div>

    <script>
        const form = document.getElementById("loginForm");
        const modal = document.getElementById("successModal");

        form.addEventListener("submit", function(e) {
            e.preventDefault(); 
            modal.style.display = "flex";
        });

        function closeModal() {
            modal.style.display = "none";
            window.location.href = "index.html"; // redirect to home
        }

        // Close modal if clicking outside
        window.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.style.display = "none";
                window.location.href = "index.html";
            }
        });
    </script>

</body>
</html>
