<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wishlist · Pure Masala</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

  <style>
    body {
      background: #faf7f2;
      font-family: 'Inter', sans-serif;
      color: #2d3e2c;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
    }
/* ----- NAVBAR (consistent with all pages) ----- */
    .navbar-custom {
      background: linear-gradient(105deg, #1f4f2b 0%, #3b7a4a 100%);
      padding: 14px 0;
      box-shadow: 0 10px 25px -8px rgba(0,40,0,0.3);
    }

    .navbar-brand {
      font-size: 1.9rem;
      font-weight: 800;
      color: #fff9e6 !important;
      font-family: 'Playfair Display', serif;
      letter-spacing: 1.2px;
      text-shadow: 2px 2px 0 #1b3b1f;
    }

    .navbar-brand i {
      color: #ffd966;
      margin-right: 8px;
      font-size: 2rem;
      vertical-align: middle;
    }

    .navbar-custom .nav-link {
      color: #f5f0e1 !important;
      font-weight: 500;
      margin: 0 12px;
      position: relative;
      transition: 0.2s;
      font-size: 1.1rem;
    }

    .navbar-custom .nav-link::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2.5px;
      background: #ffeb99;
      left: 0;
      bottom: -6px;
      transition: 0.25s ease;
      border-radius: 2px;
    }

    .navbar-custom .nav-link:hover::after {
      width: 100%;
    }

    .navbar-custom .nav-link:hover {
      color: #ffecaa !important;
      transform: translateY(-1px);
    }

    .dropdown-menu {
      border: none;
      border-radius: 16px;
      background: #ffffffec;
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 35px -6px #1f3b1f;
      padding: 8px;
    }

    .dropdown-item {
      border-radius: 12px;
      padding: 10px 20px;
      font-weight: 500;
      color: #1f4f2b;
    }

    .dropdown-item:hover {
      background: #d9f0d2;
      color: #0f3f1a;
    }

    .wishlist-section {
      padding: 60px 0;
    }

    .wishlist-box {
      background: white;
      padding: 35px;
      border-radius: 40px 12px 40px 12px;
      box-shadow: 0 25px 40px -18px #3a663a;
      border: 2px solid #fbe6b1;
    }

    .wishlist-box h2 {
      border-left: 8px solid #c62828;
      padding-left: 20px;
      margin-bottom: 30px;
      color: #1f4f2b;
    }

    .cart-img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 20px 6px 20px 6px;
      border: 2px solid #ebc78d;
    }

    .empty-wishlist {
      text-align: center;
      padding: 40px;
      color: #9aab94;
    }

    .empty-wishlist i {
      font-size: 4rem;
      margin-bottom: 15px;
      color: #d0dbb8;
    }

    .btn-move {
      background: #1f5a2a;
      color: white;
      border-radius: 30px;
      padding: 6px 16px;
      border: none;
    }

    .btn-remove {
      background: #b13e3e;
      color: white;
      border-radius: 30px;
      padding: 6px 16px;
      border: none;
    }
  </style>
</head>

<body>


<!-- ==================== NAVBAR ==================== -->
<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
  <div class="container">

    <!-- Logo (Left) -->
    <a class="navbar-brand" href="index.html">
      <p> PURE MASALA</p>
    </a>

    <button class="navbar-toggler bg-light" type="button"
      data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">

      <!-- CENTER NAV LINKS -->
      <ul class="navbar-nav mx-auto align-items-center text-center">
        <li class="nav-item">
          <a class="nav-link" href="index.html">
           <p>Home</p>
          </a>
        </li>

        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
           <p>Spices</p>
          </a>
          <ul class="dropdown-menu text-center">
            <li><a class="dropdown-item" href="wholespicess.html">Whole Spices</a></li>
            <li><a class="dropdown-item" href="groundspices.html">Ground Spices</a></li>
            <li><a class="dropdown-item" href="specialmasala.html">Special Masalas</a></li>
          </ul>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="about.html">
          <p>About</p>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="contact.html">
           <p>Contact</p>
          </a>
        </li>
      </ul>

      <!-- RIGHT SIDE ICONS -->
    <div class="d-flex flex-column flex-lg-row align-items-center justify-content-lg-end gap-3 mt-3 mt-lg-0">


        <!-- Wishlist Icon -->
        <a href="wishlist.html" class="nav-link position-relative">
          <i class="fas fa-heart fs-5"></i>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                id="wishlist-count">
            0
          </span>
        </a>

        <!-- Cart Icon -->
        <a href="cart.html" class="nav-link position-relative">
          <i class="fas fa-shopping-bag fs-5"></i>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark"
                id="cart-count">
            0
          </span>
        </a>

      </div>

    </div>
  </div>
</nav>

<!-- WISHLIST SECTION -->
<section class="wishlist-section">
  <div class="container">
    <div class="wishlist-box">
      <h2>
        <i class="fas fa-heart me-2" style="color:#c62828;"></i>
        Your Wishlist
      </h2>

      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Product</th>
              <th>Name</th>
              <th>Price</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="wishlist-items"></tbody>
        </table>
      </div>

      <div id="empty-message" class="empty-wishlist">
        <i class="fas fa-heart"></i>
        <p>Your wishlist is empty.<br>
        <a href="wholespicess.html">Explore our spices</a></p>
      </div>

    </div>
  </div>
</section>

<!-- JAVASCRIPT -->
<script>
  let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  function loadWishlist() {
    let table = document.getElementById("wishlist-items");
    let empty = document.getElementById("empty-message");

    table.innerHTML = "";

    if (wishlist.length === 0) {
      empty.style.display = "block";
      return;
    } else {
      empty.style.display = "none";
    }

    wishlist.forEach((item, index) => {
      table.innerHTML += `
        <tr>
          <td><img src="${item.image}" class="cart-img"></td>
          <td class="fw-bold">${item.name}</td>
          <td>₹${item.price}</td>
          <td>
            <button class="btn-move me-2" onclick="moveToCart(${index})">
              <i class="fas fa-shopping-cart me-1"></i>Add to Cart
            </button>
            <button class="btn-remove" onclick="removeItem(${index})">
              <i class="fas fa-trash"></i>
            </button>
          </td>
        </tr>
      `;
    });
  }

  function moveToCart(index) {
    let item = wishlist[index];

    if (!cart.some(c => c.name === item.name)) {
      cart.push({...item, quantity: 1});
    }

    wishlist.splice(index, 1);

    localStorage.setItem("cart", JSON.stringify(cart));
    localStorage.setItem("wishlist", JSON.stringify(wishlist));

    loadWishlist();
  }

  function removeItem(index) {
    wishlist.splice(index, 1);
    localStorage.setItem("wishlist", JSON.stringify(wishlist));
    loadWishlist();
  }

  loadWishlist();
</script>

</body>
</html>
